<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choir Attendance Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Choir Attendance</h1>
            <p style="color: var(--text-secondary)">Manage rehearsals, programs, and member attendance.</p>
        </header>

        <div class="grid">
            <!-- Sessions List -->
            <div class="glass-card">
                <h2>Active Sessions</h2>
                <div id="sessions-list">Loading sessions...</div>
                <button class="btn" onclick="showCreateSession()">+ New Session</button>
            </div>

            <!-- Members List -->
            <div class="glass-card">
                <h2>Members</h2>
                <div id="members-list">Loading members...</div>
                <button class="btn" onclick="showCreateMember()">+ Add Member</button>
            </div>
        </div>

        <!-- Attendance Table -->
        <div class="glass-card">
            <h2 id="attendance-title">Attendance Records</h2>
            <div id="attendance-content">
                <p>Select a session to view attendance.</p>
            </div>
        </div>
    </div>

    <!-- Modals (Simple overlays for brevity) -->
    <div id="modal-container" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; padding: 1rem; z-index: 100;">
        <div class="glass-card" style="max-width: 500px; width:100%; margin:0;">
            <h2 id="modal-title">Title</h2>
            <div id="modal-body"></div>
            <div style="display:flex; justify-content:flex-end; gap:1rem; margin-top:1rem;">
                <button class="btn" style="background:transparent; border: 1px solid var(--text-secondary)" onclick="hideModal()">Cancel</button>
                <button class="btn" id="modal-submit">Submit</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
